services:
  - type: web
    name: news-recommendation-api
    env: python
    rootDir: backend
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn -w 2 -b 0.0.0.0:$PORT app:app --timeout 120
    healthCheckPath: /health
    envVars:
      - key: PYTHON_VERSION
        value: 3.10.12
      - key: PORT
        value: 5000
      - key: FRONTEND_URL
        value: https://personalized-news-recommendation-sy-sable.vercel.app
    plan: free
